services:
  postgres:
    image: pgvector/pgvector:pg16
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 1s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 1s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: backend
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
    command:
      [
        "sh",
        "-c",
        "python manage.py migrate && python manage.py collectstatic --noinput && daphne -b 0.0.0.0 -p 8000 backend.asgi:application",
      ]
    env_file: .env
    volumes:
      - ./backend:/app
      - backend_uv_venv:/app/.venv
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile.dev
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
    command: ["bun", "run", "dev", "--", "--host"]
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"

volumes:
  frontend_node_modules:
  postgres_data:
  backend_uv_venv:
