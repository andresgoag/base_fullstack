services:
  postgres:
    image: pgvector/pgvector:pg16
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 1s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  backend:
    build:
      context: backend
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    env_file: .env
    volumes:
      - ./backend:/app
      - backend_uv_venv:/app/.venv
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:dev_password@postgres:5432/postgres
      ACCESS_LIFETIME: ${ACCESS_LIFETIME:-300}
      REFRESH_LIFETIME: ${REFRESH_LIFETIME:-604800}

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile.dev
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
    command: ["bun", "run", "dev", "--", "--host"]
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"

volumes:
  frontend_node_modules:
  postgres_data:
  backend_uv_venv:
